<div class="app-shell">
	@if (authService.isLoggedIn()) {
		<header class="top-nav">
			<div class="top-nav-left">
				<div class="logo">ADF247</div>
				<button class="nav-btn" routerLink="/home" routerLinkActive="active">Inicio</button>
				@if (authService.isAdmin()) {
					<button class="nav-btn" routerLink="/dashboard" routerLinkActive="active">Dashboard</button>
				}
			</div>

			<div class="top-nav-right">
				<span class="mini-user">
					{{ authService.getCachedNCarnet() }}
					@if (authService.getCachedNIndicatiu()) {
						| {{ authService.getCachedNIndicatiu() }}
					}
					| {{ authService.getCachedName() }} {{ authService.getCachedLastName() || '' }}
				</span>
				<button class="nav-btn logout" (click)="authService.logout()">Salir</button>
			</div>
		</header>
	}

	<main class="app-content">
		<router-outlet></router-outlet>
	</main>
</div>
