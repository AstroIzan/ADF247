<div class="login-container">
  <section class="login-shell">
    <div class="login-box">
      <div class="logo-header">
        <span>ADF</span>
        <span>247</span>
      </div>
      <h2>Iniciar Sesion</h2>
      <p class="subtitle">Panel de Gestión de Guardia</p>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="nCarnet">Numero de carnet</label>
          <input
            type="text"
            id="nCarnet"
            [(ngModel)]="nCarnet"
            name="nCarnet"
            placeholder="Ej: 247/GI/225"
            required
            [disabled]="loading()"
          />
        </div>

        <div class="form-group">
          <label for="password">Contrasena</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Introduce tu contrasena"
            required
            [disabled]="loading()"
          />
        </div>

        @if (errorMessage()) {
          <div class="error-message">{{ errorMessage() }}</div>
        }

        <button
          type="submit"
          class="login-btn"
          [disabled]="loading()"
        >
          {{ loading() ? 'Conectando...' : 'Entrar al panel' }}
        </button>
      </form>
    </div>
  </section>
</div>
