<div class="login-container">
  <section class="login-shell">
    <div class="login-box">
      <div class="logo-header">
        <span>ADF</span>
        <span>247</span>
      </div>
      <h2>Iniciar Sessió</h2>
      <p class="subtitle">Gestió de Convocatòries</p>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="nCarnet">Número de carnet</label>
          <input
            type="text"
            id="nCarnet"
            [(ngModel)]="nCarnet"
            name="nCarnet"
            placeholder="Ex: 247/GI/225"
            required
            [disabled]="loading()"
          />
        </div>

        <div class="form-group">
          <label for="password">Contrasenya</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Introdueix la contrasenya"
            required
            [disabled]="loading()"
          />
        </div>

        @if (errorMessage()) {
          <div class="error-message">{{ errorMessage() }}</div>
        }

        <button
          type="submit"
          class="login-btn"
          [disabled]="loading()"
        >
          {{ loading() ? 'Connectant...' : 'Entrar al panell' }}
        </button>
      </form>
    </div>
  </section>
</div>
